{% extends 'base.html' %}

{% block title %}Página não encontrada — Vinil{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-16">

  <div class="relative overflow-hidden bg-gradient-to-br from-violet-600 via-fuchsia-500 to-pink-400 rounded-3xl shadow-2xl max-w-lg w-full text-center p-12">

    <!-- Orbs decorativos -->
    <div class="absolute -top-20 -right-20 w-64 h-64 rounded-full bg-white/10 blur-3xl pointer-events-none" aria-hidden="true"></div>
    <div class="absolute -bottom-16 -left-16 w-48 h-48 rounded-full bg-pink-300/20 blur-3xl pointer-events-none" aria-hidden="true"></div>

    <div class="relative">
      <p class="text-9xl font-extrabold text-white/30 leading-none select-none" aria-hidden="true">404</p>

      <div class="mt-2 mb-6">
        <h1 class="text-2xl sm:text-3xl font-extrabold text-white leading-tight">
          Página não encontrada
        </h1>
        <p class="mt-3 text-white/75 text-sm sm:text-base leading-relaxed">
          A página que você está procurando não existe ou foi movida.
        </p>
      </div>

      <a href="{% url 'home' %}"
         class="inline-flex items-center gap-2 px-6 py-3 bg-white text-violet-700 font-bold rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Voltar ao início
      </a>
    </div>

  </div>

</section>
{% endblock %}
