{% if messages %}
<div class="max-w-7xl mx-auto px-4 pt-4 flex flex-col gap-2">
  {% for message in messages %}
    <div class="flex items-center justify-between px-4 py-3 rounded-xl border text-sm font-medium
      {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-700
      {% elif message.tags == 'error' %}bg-rose-50 border-rose-200 text-rose-700
      {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-700
      {% else %}bg-violet-50 border-violet-200 text-violet-700{% endif %}">
      <span>{{ message }}</span>
      <button onclick="this.parentElement.remove()" aria-label="Fechar" class="ml-4 opacity-60 hover:opacity-100 transition-opacity">&#x2715;</button>
    </div>
  {% endfor %}
</div>
{% endif %}
