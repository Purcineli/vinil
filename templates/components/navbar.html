<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
    <a href="/" class="text-xl font-bold bg-gradient-to-r from-violet-600 to-fuchsia-500 bg-clip-text text-transparent">🎵 Vinil</a>
    <div class="flex items-center gap-3">
      {% if user.is_authenticated %}
        <a href="/dashboard/" class="text-sm text-slate-600 hover:text-violet-600 font-medium transition-colors">Dashboard</a>
        <form method="post" action="/logout/">
          {% csrf_token %}
          <button type="submit" class="text-sm text-slate-600 hover:text-rose-600 font-medium transition-colors">Sair</button>
        </form>
      {% else %}
        <a href="/login/" class="text-sm text-slate-600 hover:text-violet-600 font-medium transition-colors">Entrar</a>
        <a href="/cadastro/" class="px-4 py-2 rounded-xl bg-gradient-to-r from-violet-600 to-fuchsia-500 text-white text-sm font-semibold hover:opacity-90 transition-opacity">Cadastre-se</a>
      {% endif %}
    </div>
  </div>
</nav>
