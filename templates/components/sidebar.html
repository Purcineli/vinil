<aside class="w-64 min-h-screen bg-gradient-to-b from-slate-900 to-violet-950 text-white flex flex-col py-6 px-4 gap-1 shadow-xl">
  <div class="mb-6 px-2">
    <a href="/" class="text-xl font-bold bg-gradient-to-r from-violet-300 to-fuchsia-300 bg-clip-text text-transparent">🎵 Vinil</a>
  </div>

  <a href="/dashboard/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 font-medium text-sm transition-all">
    📊 Dashboard
  </a>
  <a href="/eventos/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 font-medium text-sm transition-all">
    🎪 Eventos
  </a>
  <a href="/pedidos/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 font-medium text-sm transition-all">
    🛒 Meus Pedidos
  </a>
  <a href="/meus-ingressos/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 font-medium text-sm transition-all">
    🎟️ Meus Ingressos
  </a>
  <a href="/portaria/validar/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 font-medium text-sm transition-all">
    🚪 Validar Ingresso
  </a>

  <div class="mt-auto flex flex-col gap-1">
    <a href="/perfil/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/10 font-medium text-sm transition-all">
      👤 Perfil
    </a>
    <form method="post" action="/logout/">
      {% csrf_token %}
      <button type="submit" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-rose-400 hover:text-white hover:bg-rose-600/30 font-medium text-sm transition-all">
        🚪 Sair
      </button>
    </form>
  </div>
</aside>
